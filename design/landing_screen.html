<div class="fixed inset-0 grid-pulse pointer-events-none z-0"></div>

<main class="relative z-10 flex items-center justify-center min-h-screen p-4">

<div class="absolute right-2 top-1/2 -translate-y-1/2 opacity-0 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary-container text-sm" data-icon="lock_open">lock_open</span>
</div>
</div>
</div>
<div class="flex flex-col space-y-4">
<button class="group relative w-full overflow-hidden rounded-lg bg-primary-container py-4 font-rajdhani font-bold tracking-[0.15em] text-on-primary-fixed hover:shadow-[0_0_20px_rgba(0,245,255,0.4)] transition-all duration-300 transform active:scale-[0.98]">
<span class="relative z-10">START CHATTING</span>
<div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
</button>
<div class="flex items-center justify-between px-2">
<div class="flex items-center space-x-2 text-[10px] text-on-surface-variant font-label tracking-tighter">

<span>NODE 07 ACTIVE</span>
</div>
<div class="flex items-center space-x-1 text-[10px] text-on-surface-variant font-label tracking-tighter">
<span class="material-symbols-outlined text-[12px]" data-icon="fingerprint">fingerprint</span>

</div>
</div>
</div>
</form>
<!-- Decorative Elements -->
<div class="absolute -top-1 -left-1 w-8 h-8 border-t border-l border-primary-container/60 rounded-tl-lg"></div>

</div>

<div class="flex items-center space-x-8 text-[10px] font-label tracking-[0.2em] text-on-surface-variant/40 uppercase">

</div>

<span class="material-symbols-outlined text-[14px] mr-2" data-icon="security">security</span>
